<!DOCTYPE html>

<head>

<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,-apple-system,sans-serif;background:#F8FAFC;color:#1E293B}
  a{text-decoration:none;color:inherit}
  button{cursor:pointer;font-family:inherit}
  input,select{font-family:inherit}
  .hidden{display:none!important}

  /* Layout */
  #app{min-height:100vh}
  .sidebar{width:210px;background:#0F1E3C;min-height:100vh;display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0}

  .btn-success{background:#10B981;color:#fff;border:none;border-radius:8px;padding:10px 18px;font-weight:600;font-size:13px}
  .btn-ghost{background:#F1F5F9;color:#334155;border:none;border-radius:8px;padding:10px 18px;font-weight:600;font-size:13px}

  .form-label{display:block;font-size:12px;font-weight:600;color:#334155;margin-bottom:5px}
  .form-input{width:100%;padding:9px 12px;border:1.5px solid #E2E8F0;border-radius:8px;font-size:13px;color:#1E293B;outline:none}
  .form-input:focus{border-color:#10B981}
  .form-error{color:#EF4444;font-size:12px;margin-top:6px}

  .sidebar-footer{padding:10px;border-top:1px solid rgba(255,255,255,0.08)}

  /* KPI grid */
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
  .kpi-card{background:#fff;border:1px solid #E2E8F0;border-radius:12px;padding:18px}

  /* Badge */
  .badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}

  .badge-red{background:#FEE2E2;color:#EF4444}

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ─── ROUTER ──────────────────────────────────────────────
let currentView = null;
function navigate(view) {
  currentView = view;
  history.pushState({}, "", "#" + view);
  render();
}
window.addEventListener("popstate", render);

// ─── STATE ───────────────────────────────────────────────
let state = { user: null, company: null, subscription: null, loading: true };

async function loadSession() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { state.loading = false; return; }
  state.user = session.user;
  // Load company + subscription
  const { data: usr } = await sb.from("users").select("company_id").eq("id", session.user.id).single();
  if (usr) {
    const { data: co } = await sb.from("companies").select("*").eq("id", usr.company_id).single();
    const { data: sub } = await sb.from("subscriptions").select("*").eq("company_id", usr.company_id).single();
    state.company = co;
    state.subscription = sub;
  }
  state.loading = false;
  render();
}

// ─── MAIN RENDER ─────────────────────────────────────────
async function render() {
  const hash = location.hash.replace("#", "") || "home";
  const app = document.getElementById("app");

  if (state.loading) { app.innerHTML = renderLoader(); return; }

  const publicRoutes = ["home", "login", "register", "checkout", "payment-success"];
  if (!state.user && !publicRoutes.includes(hash)) { navigate("login"); return; }

  if (state.user && ["login","register"].includes(hash)) { navigate("dashboard"); return; }

  // Bloquear acceso si no tiene suscripción activa
  if (state.user && ["dashboard","insights","settings","billing"].includes(hash)) {
    if (!state.subscription || state.subscription.status !== "active") {
      if (hash !== "billing") { app.innerHTML = renderBlocked(); return; }
    }
  }

  switch(hash) {
    case "home":           app.innerHTML = renderHome(); break;
    case "login":          app.innerHTML = renderLogin(); break;
    case "register":       app.innerHTML = renderRegister(); break;
    case "checkout":       app.innerHTML = renderCheckout(); break;
    case "onboarding":     app.innerHTML = renderOnboarding(); break;
    case "payment-success": await handlePaymentSuccess(); break;
    case "dashboard":      app.innerHTML = renderApp("dashboard"); break;
    case "insights":       app.innerHTML = renderApp("insights"); break;
    case "billing":        app.innerHTML = renderApp("billing"); break;
    case "settings":       app.innerHTML = renderApp("settings"); break;
    default:               navigate("home");
  }

  attachListeners();
}

  <div style="font-family:system-ui,sans-serif;background:#fff;min-height:100vh">
    <nav style="display:flex;justify-content:space-between;align-items:center;padding:16px 48px;border-bottom:1px solid #E2E8F0;position:sticky;top:0;background:#fff;z-index:10">

// ─── EVENT LISTENERS ─────────────────────────────────────
let selectedPlan = "growth";
let onboardingData = {};

function attachListeners() {
  // Navigation
  document.querySelectorAll("[data-nav]").forEach(btn => {
    btn.addEventListener("click", () => navigate(btn.dataset.nav));
  });

  // Hash links
  document.querySelectorAll("a[href^='#']").forEach(a => {
    a.addEventListener("click", e => {
      e.preventDefault();
      navigate(a.getAttribute("href").replace("#",""));
    });
  });

  // Logout
  const btnLogout = document.getElementById("btn-logout");
  if (btnLogout) btnLogout.addEventListener("click", async () => {
    await sb.auth.signOut();
    state = { user:null, company:null, subscription:null, loading:false };
    navigate("home");
  });

  // Login
  const btnLogin = document.getElementById("btn-login");
  if (btnLogin) btnLogin.addEventListener("click", async () => {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    btnLogin.innerHTML = '<span class="spinner"></span>Ingresando...';
    btnLogin.disabled = true;
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) { document.getElementById("app").innerHTML = renderLogin("Email o contraseña incorrectos"); attachListeners(); return; }
    await loadSession();
    navigate("dashboard");
  });

  // Register
  const btnRegister = document.getElementById("btn-register");
  if (btnRegister) btnRegister.addEventListener("click", async () => {
    const name = document.getElementById("fullname").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    if (!name || !email || !password) { document.getElementById("app").innerHTML = renderRegister("Completá todos los campos"); attachListeners(); return; }
    btnRegister.innerHTML = '<span class="spinner"></span>Creando cuenta...';
    btnRegister.disabled = true;
    const { data: authData, error } = await sb.auth.signUp({ email, password, options: { data: { full_name: name } } });
    if (error) { document.getElementById("app").innerHTML = renderRegister(error.message); attachListeners(); return; }
    // Create company
    const { data: company } = await sb.from("companies").insert({ name: "Mi Empresa", is_active: false }).select().single();
    await sb.from("users").insert({ id: authData.user.id, company_id: company.id, email, role: "admin" });
    await sb.auth.updateUser({ data: { company_id: company.id, full_name: name } });
    state.user = authData.user;
    state.company = company;
    navigate("checkout");
  });

  // Plan selection
  document.querySelectorAll(".plan-card").forEach(card => {
    card.addEventListener("click", () => {
      selectedPlan = card.dataset.plan;
      document.querySelectorAll(".plan-card").forEach(c => {
        const p = PLANS.find(x => x.id === c.dataset.plan);
        c.style.borderColor = c.dataset.plan === selectedPlan ? "#10B981" : "#E2E8F0";
        c.style.background = c.dataset.plan === selectedPlan ? "#D1FAE5" : (p?.popular ? "#D1FAE5" : "#fff");
      });
      const btn = document.getElementById("btn-pay");
      if (btn) btn.textContent = `Continuar con Plan ${PLANS.find(p=>p.id===selectedPlan)?.name} →`;
    });
  });

  // Pay
  const btnPay = document.getElementById("btn-pay");
  if (btnPay) btnPay.addEventListener("click", async () => {
    const link = STRIPE_PAYMENT_LINKS[selectedPlan];
    if (!link || link.startsWith("REEMPLAZAR")) {
      alert("Configurá los Payment Links de Stripe en el archivo index.html"); return;
    }
    const { data: { session } } = await sb.auth.getSession();
    const { data: usr } = await sb.from("users").select("company_id").eq("id", session.user.id).single();
    const companyId = usr?.company_id;
    window.location.href = `${link}?client_reference_id=${companyId}&prefilled_email=${session.user.email}`;
  });

  // Onboarding
  const btnNext = document.getElementById("btn-next");
  const btnBack = document.getElementById("btn-back");
  const container = document.querySelector("[data-step]");

  if (btnNext && container) {
    const step = parseInt(container.dataset.step);
    btnNext.addEventListener("click", async () => {
      if (step === 0) {
        const name = document.getElementById("company-name").value.trim();
        if (!name) return;
        onboardingData.name = name;
        document.getElementById("app").innerHTML = renderOnboarding(1, onboardingData);
        attachListeners();
      } else if (step === 1) {
        onboardingData.industry = document.getElementById("industry").value;
        onboardingData.size = document.getElementById("team-size").value;
        document.getElementById("app").innerHTML = renderOnboarding(2, onboardingData);
        attachListeners();
      } else {
        // Complete onboarding
        const { data: { session } } = await sb.auth.getSession();
        const { data: usr } = await sb.from("users").select("company_id").eq("id", session.user.id).single();
        await sb.from("companies").update({ name: onboardingData.name, industry: onboardingData.industry, team_size: onboardingData.size }).eq("id", usr.company_id);
        await loadSession();
        navigate("dashboard");
      }
    });
    if (btnBack) btnBack.addEventListener("click", () => {
      if (step > 0) { document.getElementById("app").innerHTML = renderOnboarding(step-1, onboardingData); attachListeners(); }
    });
  }

  // Insights buttons
  ["btn-insights","btn-insights2"].forEach(id => {
    const btn = document.getElementById(id);
    if (btn) btn.addEventListener("click", generateInsights);
  });

  // Draw chart
  if (document.getElementById("npsChart")) {
    new Chart(document.getElementById("npsChart"), {
      type: "line",
      data: {
        labels: ["Ene","Feb","Mar","Abr","May","Jun"],
        datasets: [{ data: [28,31,35,29,38,42], borderColor: "#10B981", backgroundColor: "rgba(16,185,129,0.08)", borderWidth: 2.5, pointBackgroundColor: "#10B981", pointRadius: 4, tension: 0.3, fill: true }]
      },
      options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false } }, y: { grid: { color: "#F1F5F9" }, min: 0, max: 60 } } }
    });
  }
}

// ─── GENERATE INSIGHTS ───────────────────────────────────
async function generateInsights() {
  const result = document.getElementById("insights-result");
  if (!result) return;
  result.innerHTML = `<div style="text-align:center;padding:60px 40px;background:#fff;border-radius:16px;border:1px solid #E2E8F0"><div style="font-size:36px;margin-bottom:12px">⚙️</div><p style="color:#334155;font-size:14px;font-weight:500">Claude está analizando los comentarios...</p><p style="color:#94A3B8;font-size:12px">Esto puede tardar unos segundos</p></div>`;

  const comments = [
    { score: 9, text: "El soporte es excelente, responden muy rápido." },
    { score: 10, text: "Increíble plataforma, nos ahorró horas de trabajo." },
    { score: 4, text: "La integración con nuestro CRM fue complicada y tardó semanas." },
    { score: 2, text: "El precio no justifica las funcionalidades actuales." },
    { score: 7, text: "Buena herramienta pero falta documentación más detallada." },
    { score: 8, text: "El onboarding podría ser más guiado para usuarios no técnicos." },
  ];

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-api-key": "", "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1024,
        messages: [{ role: "user", content: `Sos experto en Customer Success B2B. Analizá estos comentarios NPS y devolvé SOLO JSON sin texto extra:\n{"resumen":"frase corta","positivos":["punto 1","punto 2"],"problemas":["problema 1","problema 2"],"acciones":[{"accion":"accion 1","impacto":"alto"},{"accion":"accion 2","impacto":"medio"}]}\n\nComentarios:\n${comments.map(c=>`Score ${c.score}: "${c.text}"`).join("\n")}` }]
      })
    });
    const data = await res.json();
    let text = data.content[0].text.replace(/```json|```/g,"").trim();
    const ins = JSON.parse(text);
    result.innerHTML = `
      <div style="display:flex;flex-direction:column;gap:18px">
        <div style="background:#0F1E3C;border-radius:14px;padding:22px;display:flex;gap:14px">
          <div style="font-size:28px">📊</div>
          <div><p style="margin:0 0 4px;font-size:11px;color:rgba(255,255,255,0.4);font-weight:500">RESUMEN EJECUTIVO</p>
          <p style="margin:0;color:#fff;font-size:15px;font-weight:500;line-height:1.5">${ins.resumen}</p></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div class="card"><div style="display:flex;align-items:center;gap:8px;margin-bottom:14px"><span style="font-size:16px">✅</span><h3 style="margin:0;font-size:13px;font-weight:600;color:#1E293B">Puntos fuertes</h3></div>
            ${ins.positivos.map(p=>`<div style="display:flex;gap:7px;padding:9px 11px;background:#D1FAE5;border-radius:8px;margin-bottom:6px;font-size:12px;color:#065F46"><span>✓</span>${p}</div>`).join("")}
          </div>
          <div class="card"><div style="display:flex;align-items:center;gap:8px;margin-bottom:14px"><span style="font-size:16px">🔴</span><h3 style="margin:0;font-size:13px;font-weight:600;color:#1E293B">Problemas detectados</h3></div>
            ${ins.problemas.map(p=>`<div style="display:flex;gap:7px;padding:9px 11px;background:#FEE2E2;border-radius:8px;margin-bottom:6px;font-size:12px;color:#991B1B"><span>✗</span>${p}</div>`).join("")}
          </div>
        </div>
        <div class="card"><div style="display:flex;align-items:center;gap:8px;margin-bottom:14px"><span style="font-size:16px">🎯</span><h3 style="margin:0;font-size:13px;font-weight:600;color:#1E293B">Acciones recomendadas</h3></div>
          ${ins.acciones.map((a,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid #E2E8F0;border-radius:10px;margin-bottom:8px">
            <div style="width:24px;height:24px;border-radius:50%;background:#0F1E3C;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0">${i+1}</div>
            <p style="margin:0;font-size:12px;color:#334155;flex:1">${a.accion}</p>
            <span class="badge ${a.impacto==='alto'?'badge-green':'badge-yellow'}">${a.impacto.toUpperCase()}</span>
          </div>`).join("")}
        </div>
      </div>`;
  } catch(e) {
    result.innerHTML = `<div style="background:#FEE2E2;border-radius:12px;padding:16px;color:#991B1B;font-size:13px">Error al generar insights. Verificá la configuración de la API key.</div>`;
  }
}

// ─── PAYMENT SUCCESS ─────────────────────────────────────
async function handlePaymentSuccess() {
  document.getElementById("app").innerHTML = renderLoader();
  await new Promise(r => setTimeout(r, 2000));
  await loadSession();
  navigate("onboarding");
}

sb.auth.onAuthStateChange(() => { loadSession().then(render); });
